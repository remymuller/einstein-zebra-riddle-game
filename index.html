<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>L'Énigme d'Einstein</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#b86a00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Énigme">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="phone-sim">
    <div class="phone-home"></div>
    <div id="phone-screen">
      <div id="board-area">
        <div class="board-label">Solution</div>
        <div id="board"></div>
      </div>
  <div id="rules-panel">
        <div id="rules-toolbar">
          <button id="btn-undo" onclick="undo()" title="Annuler (⌘Z)">↩ Annuler</button>
          <button id="btn-redo" onclick="redo()" title="Rétablir (⌘⇧Z)">↪ Rétablir</button>
          <button id="btn-tutorial" onclick="toggleTutorial()" title="Guide pas à pas">🎓 Guide</button>
        </div>
        <div id="tutorial-hint" hidden>
          <div id="tutorial-hint-body">
            <span id="tutorial-step-num"></span>
            <span id="tutorial-hint-text"></span>
          </div>
          <button id="btn-show-me" onclick="tutorialAutoPlace()">Montrer</button>
        </div>
        <div id="rules-list"></div>
      </div>
    </div>
  </div>
  <div id="win-screen" hidden>
    <div id="win-card">
      <div class="win-check">✓</div>
      <div class="win-title">Résolu&nbsp;!</div>
      <div class="win-stats">
        <div class="win-stat"><span class="win-val" id="win-moves">—</span><span class="win-label">coups</span></div>
        <div class="win-sep"></div>
        <div class="win-stat"><span class="win-val" id="win-time">—</span><span class="win-label">temps</span></div>
      </div>
      <button class="win-btn" onclick="resetGame()">Rejouer</button>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
